<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌅</text></svg>">
<link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌅</text></svg>">
<style>
  /* 水平布局：标题区 + GitHub 链接 两端对齐 */
  .page-header {
    padding: 0.9rem 2.5rem !important;
    display: flex !important;
    flex-direction: row !important;
    align-items: center !important;
    justify-content: space-between !important;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  /* 左侧：标题 + 副标题竖排 */
  .page-header .header-left {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.15rem;
  }

  .project-name {
    font-size: 1.4rem !important;
    margin: 0 !important;
    line-height: 1.2;
  }

  .project-tagline {
    font-size: 0.82rem !important;
    margin: 0 !important;
    opacity: 0.82;
    line-height: 1.3;
  }

  /* 右侧：GitHub 按钮 */
  .page-header .btn {
    margin: 0 !important;
    padding: 0.4rem 1rem !important;
    font-size: 0.82rem !important;
    white-space: nowrap;
  }

  @media screen and (max-width: 42em) {
    .page-header {
      padding: 0.8rem 1.2rem !important;
    }
    .project-name {
      font-size: 1.15rem !important;
    }
  }
</style>

<script>
  /* 把 project-name 和 project-tagline 包进 .header-left div */
  document.addEventListener("DOMContentLoaded", function () {
    var header = document.querySelector(".page-header");
    if (!header) return;
    var name = header.querySelector(".project-name");
    var tag  = header.querySelector(".project-tagline");
    if (!name) return;
    var wrap = document.createElement("div");
    wrap.className = "header-left";
    header.insertBefore(wrap, name);
    wrap.appendChild(name);
    if (tag) wrap.appendChild(tag);
  });
</script>
